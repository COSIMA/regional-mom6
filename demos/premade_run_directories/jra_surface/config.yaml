## Example of a config.yaml file for running mom6 via payu

project: x77
queue: normal
walltime: 02:00:00
jobname: mom6_regional
ncpus: 82
jobfs: 10GB

shortpath: /scratch/x77

model: mom6
input:
    - /scratch/v45/ab8992/mom6/regional_configs/gippsland
    - /g/data/ik11/inputs/JRA-55/RYF/v1-3/

## You'll need to provide your own executable. If on gadi, you can request access to this one
## but beware, ACCESS-NRI isn't actively maintaining an FMS based executable since they now
## work with NUOPC. See the rOM3 setup instead for a better maintained NUOPC based 
## regional mom6 run on Gadi / NCI
exe: /g/data/ik11/mom_executables/jan2024-latest-everything


collate: false
storage:
  gdata:
    - ua8
    - x77
    - ik11

mpi:
  module: openmpi/4.1.2
